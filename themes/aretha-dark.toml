# Aretha Dark — warm-black ground with aged gold, rose, and sage.
# A soulful, low-chroma dark palette that leans into warm amber
# highlights instead of the cool cyans of the default cyberpunk
# look. Named for the Queen of Soul — gold as royalty, burgundy
# as velvet, sage as a quiet undercurrent.

