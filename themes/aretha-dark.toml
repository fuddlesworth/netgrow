# Aretha Dark — navy-and-sky-blue palette ported from the
# Aretha Plasma KDE color scheme via fuddlesworth's VS Code theme
# (https://github.com/fuddlesworth/aretha-dark-vscode). Deep navy
# ground, sky-blue accents, crimson errors, emerald positives.

frame          = "#3DAEE9"  # active/accent
frame_accent   = "#478ED5"  # links/functions
bar_bg         = "#162239"  # editor bg
label          = "#D3DAE3"  # foreground text
value          = "#D3DAE3"
ghost          = "#273E66"  # selection (muted)
accent         = "#3DAEE9"

header_brand_bg = "#3DAEE9"
header_brand_fg = "#162239"
stat_label      = "#B48EAD"  # modifiers/imports (dusty mauve)
stat_value      = "#D3DAE3"
stat_packets    = "#56B6C2"  # booleans/null (teal)
stat_infected   = "#C74264"  # control flow / errors (crimson)

pwned          = "#C74264"
pwned_alt      = "#FFAA7F"  # types/constants (salmon)
dying_alt      = "#FFAA7F"
honey_reveal   = "#E5C07B"  # type keywords (wheat/amber)
shield_flash_a = "#3DAEE9"
shield_flash_b = "#478ED5"
mutated_flash_a = "#B48EAD"
mutated_flash_b = "#D19A66"  # numbers/escapes (tan)

scanner  = "#56B6C2"  # teal
exfil    = "#478ED5"  # muted sky blue
defender = "#00AA7F"  # strings/positive (emerald)

patch_wave = "#00AA7F"
packet     = "#3DAEE9"
cross_link = "#B48EAD"
ping       = "#56B6C2"
cursor     = "#E5C07B"

branch_palette = [
  "#00AA7F",  # emerald
  "#3DAEE9",  # accent blue
  "#56B6C2",  # teal
  "#478ED5",  # muted blue
  "#E5C07B",  # wheat
  "#D19A66",  # tan
  "#FFAA7F",  # salmon
  "#B48EAD",  # mauve
]

faction_palette = [
  "#3DAEE9",  # accent blue
  "#FFAA7F",  # salmon
  "#00AA7F",  # emerald
  "#B48EAD",  # mauve
]

strain_palette = [
  "#C74264",  # crimson
  "#B48EAD",  # mauve
  "#C74264",
  "#D19A66",  # tan
  "#FFAA7F",  # salmon
  "#B48EAD",
  "#C74264",
  "#D19A66",
]

log_handshake = "#00AA7F"
log_beacon    = "#273E66"
log_lost      = "#C74264"
log_hardened  = "#3DAEE9"
log_shielded  = "#56B6C2"
log_cured     = "#00AA7F"
log_cascade   = "#FFAA7F"
log_strain    = "#B48EAD"
log_worm      = "#C74264"
log_mutated   = "#B48EAD"
log_bridge    = "#478ED5"
log_c2_online = "#3DAEE9"
log_default   = "#D3DAE3"
log_zero_day_bg = "#E5C07B"
log_honeypot_bg = "#E5C07B"
log_injected_bg = "#C74264"
